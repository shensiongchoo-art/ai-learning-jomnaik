name: Update AI News Feed

on:
  workflow_dispatch:
  schedule:
    # Twice daily. GitHub schedules run in UTC.
    - cron: '0 0,12 * * *'

permissions:
  contents: write

jobs:
  update-news:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch and append AI news
        run: node scripts/fetch-ai-news.mjs

      - name: Commit updated news feed
        run: |
          if git diff --quiet data/news-feed.json; then
            echo "No news feed changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/news-feed.json
          git commit -m "Update scheduled AI news feed"
          git push
