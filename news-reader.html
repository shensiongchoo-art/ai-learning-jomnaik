<!DOCTYPE html>
<html lang="zh-Hans">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>AI 新闻阅读器 — JomNaik</title>
<style>
:root{--bg:#080b12;--panel:#111827;--card:#151f31;--border:#263449;--text:#eef3ff;--muted:#91a0b8;--accent:#7c6cff;--green:#00d49f;--safe-top:env(safe-area-inset-top);--safe-bottom:env(safe-area-inset-bottom)}*{box-sizing:border-box}body{margin:0;background:radial-gradient(circle at top left,rgba(124,108,255,.18),transparent 34%),var(--bg);color:var(--text);font-family:'Segoe UI','PingFang SC','Microsoft YaHei',system-ui,sans-serif}.app{max-width:980px;margin:0 auto;padding:calc(14px + var(--safe-top)) 14px calc(86px + var(--safe-bottom))}.top{position:sticky;top:0;z-index:10;margin:calc(-14px - var(--safe-top)) -14px 14px;padding:calc(14px + var(--safe-top)) 14px 12px;background:rgba(8,11,18,.94);backdrop-filter:blur(16px);border-bottom:1px solid var(--border)}.brand{display:flex;justify-content:space-between;align-items:center;gap:10px}.left{display:flex;gap:10px;align-items:center;min-width:0}.logo{width:42px;height:42px;border-radius:14px;display:grid;place-items:center;background:linear-gradient(135deg,var(--accent),#2dd4bf);font-size:22px}h1{margin:0;font-size:18px}.sub{color:var(--muted);font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.actions{display:flex;gap:8px}.btn,.home{border:1px solid var(--border);background:#182235;color:var(--text);border-radius:999px;padding:8px 11px;text-decoration:none;font-size:12px}.searchrow{display:grid;grid-template-columns:1fr 44px;gap:9px;margin-top:12px}.search{border:1px solid var(--border);background:#111827;color:var(--text);border-radius:14px;padding:12px;font-size:15px;outline:none}.tabs{display:flex;gap:8px;overflow-x:auto;padding-top:10px;scrollbar-width:none}.tabs::-webkit-scrollbar{display:none}.tab{flex:none;border:1px solid var(--border);background:#111827;color:var(--muted);border-radius:999px;padding:8px 12px;font-size:12px}.tab.active{color:var(--text);border-color:var(--accent);background:rgba(124,108,255,.22);font-weight:700}.hero{background:linear-gradient(180deg,rgba(21,31,49,.95),rgba(17,24,39,.95));border:1px solid var(--border);border-radius:22px;padding:18px;margin-bottom:14px}.eyebrow{color:var(--green);font-size:12px;font-weight:800;letter-spacing:.12em}.hero h2{margin:8px 0;font-size:23px;line-height:1.15}.hero p{margin:0;color:var(--muted);font-size:14px;line-height:1.6}.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:14px}.stat{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.06);border-radius:15px;padding:10px}.stat b{display:block;font-size:17px}.stat span{font-size:11px;color:var(--muted)}.feed{display:flex;flex-direction:column;gap:12px}.card{display:block;text-decoration:none;color:inherit;background:linear-gradient(180deg,var(--card),#111a2a);border:1px solid var(--border);border-radius:20px;padding:14px;overflow:hidden}.photos{display:flex;gap:8px;overflow-x:auto;margin:-2px -2px 12px;padding:2px 2px 4px;scrollbar-width:thin}.photos img{height:128px;min-width:170px;max-width:230px;object-fit:cover;border-radius:14px;border:1px solid rgba(255,255,255,.08);background:#0b1020;flex:0 0 auto}.photos.one img{height:190px;min-width:100%;max-width:100%}.photos.two img{min-width:calc(50% - 4px);max-width:calc(50% - 4px)}.meta{display:flex;justify-content:space-between;gap:10px;margin-bottom:8px}.source{color:#b8b3ff;font-size:11px;font-weight:800;text-transform:uppercase;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.age{color:var(--muted);font-size:12px;flex:none}.card h3{margin:0;font-size:17px;line-height:1.35}.snippet{color:var(--muted);font-size:14px;line-height:1.5;margin:8px 0 0;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}.tags{display:flex;gap:7px;flex-wrap:wrap;margin-top:10px}.tag{background:rgba(124,108,255,.12);border:1px solid rgba(124,108,255,.22);color:#d7d3ff;border-radius:999px;padding:4px 8px;font-size:11px}.empty{border:1px dashed var(--border);border-radius:18px;padding:24px;text-align:center;color:var(--muted)}.bottom{position:fixed;left:0;right:0;bottom:0;background:rgba(8,11,18,.94);border-top:1px solid var(--border);padding:9px 12px calc(9px + var(--safe-bottom));backdrop-filter:blur(16px)}.bottomin{max-width:680px;margin:0 auto;display:grid;grid-template-columns:repeat(4,1fr);gap:6px}.nav{border:0;background:transparent;color:var(--muted);font-size:12px;display:flex;flex-direction:column;align-items:center;gap:3px}.nav.active{color:var(--text)}@media(min-width:850px){.bottom{display:none}.app{padding-bottom:40px}.photos img{height:150px}}
</style>
</head>
<body>
<div class="app">
<header class="top">
  <div class="brand"><div class="left"><div class="logo">📡</div><div><h1 id="appTitle">AI 新闻阅读器</h1><div id="subtitle" class="sub">定时更新 · 最新优先 · 手机友好</div></div></div><div class="actions"><button id="lang" class="btn">EN</button><a id="home" class="home" href="index.html">返回首页</a></div></div>
  <div class="searchrow"><input id="search" class="search" type="search"><button id="reload" class="btn">↻</button></div>
  <nav id="tabs" class="tabs"></nav>
</header>
<section class="hero"><div id="eyebrow" class="eyebrow">独立新闻阅读页</div><h2 id="heroTitle">高信号 AI 新闻，过滤掉杂讯标题。</h2><p id="heroDesc">默认简体中文界面。新闻原文标题与摘要保留来源语言；如果 RSS 提供图片，每篇最多显示 5 张预览图，手机可左右滑动。</p><div class="stats"><div class="stat"><b id="shown">—</b><span id="shownLabel">显示</span></div><div class="stat"><b id="total">—</b><span id="totalLabel">相关</span></div><div class="stat"><b id="latest">—</b><span id="latestLabel">最新</span></div></div></section>
<main id="feed" class="feed"></main>
</div>
<nav class="bottom"><div class="bottomin"><button class="nav active" data-cat="All"><b>📰</b><span id="bAll">全部</span></button><button class="nav" data-cat="US & Global AI"><b>🤖</b><span id="bAI">AI</span></button><button class="nav" data-cat="AI Hardware"><b>⚡</b><span id="bChip">芯片</span></button><button class="nav" data-cat="China AI"><b>🐉</b><span id="bChina">中国</span></button></div></nav>
<script>
const CATS=['All','US & Global AI','China AI','AI Hardware','Other AI Tech','AI Policy & Safety'];
const I={zh:{title:'AI 新闻阅读器',home:'返回首页',toggle:'EN',sub:(a,b)=>`${a} 条显示 · ${b} 条相关内容 · 最新优先`,init:'定时更新 · 最新优先 · 手机友好',search:'搜索 AI、Claude Code、芯片、政策…',eyebrow:'独立新闻阅读页',hero:'高信号 AI 新闻，过滤掉杂讯标题。',desc:'默认简体中文界面。新闻原文标题与摘要保留来源语言；如果 RSS 提供图片，每篇最多显示 5 张预览图，手机可左右滑动。',shown:'显示',total:'相关',latest:'最新',empty:'这个筛选暂时没有相关内容。可试试「全部新闻」，或重新运行 GitHub Actions。',loading:'正在载入保存的新闻 feed…',fail:'无法载入 data/news-feed.json：',tabs:{'All':'全部新闻','US & Global AI':'🤖 全球 AI','China AI':'🐉 中国 AI','AI Hardware':'⚡ AI 硬件','Other AI Tech':'🔬 其他 AI 技术','AI Policy & Safety':'⚖️ 政策与安全'},bottom:['全部','AI','芯片','中国']},en:{title:'AI News Reader',home:'Back Home',toggle:'简中',sub:(a,b)=>`${a} shown · ${b} relevant saved · newest first`,init:'Scheduled feed · latest first · mobile friendly',search:'Search AI, Claude Code, chips, policy…',eyebrow:'Separate reader page',hero:'High-signal AI news without noisy general headlines.',desc:'Chinese-first interface. Original source titles and snippets are preserved; if RSS provides images, each story shows up to 5 preview images with mobile swipe.',shown:'shown',total:'relevant',latest:'latest',empty:'No relevant items for this filter yet. Try All News or run the workflow again.',loading:'Loading saved feed…',fail:'Could not load data/news-feed.json: ',tabs:{'All':'All News','US & Global AI':'🤖 Global AI','China AI':'🐉 China AI','AI Hardware':'⚡ AI Hardware','Other AI Tech':'🔬 Other AI Tech','AI Policy & Safety':'⚖️ Policy & Safety'},bottom:['All','AI','Chips','China']}};
const IN=['ai','artificial intelligence','machine learning','llm','claude','chatgpt','openai','anthropic','gemini','mistral','deepseek','qwen','baidu','alibaba','tencent','agent','automation','robot','gpu','nvidia','amd','intel','tsmc','semiconductor','chip','hbm','model','inference','training','safety','policy','codex','claude code','cursor'];
const OUT=['taylor swift','travis kelce','ebola','heatwave','earthquake','wildfire','football','basketball','playstation','half-life','keyboard review','celebrity','wedding','shark species'];
let lang=localStorage.getItem('newsReaderLang')||'zh',items=[],cat='All',q='';const $=id=>document.getElementById(id),T=()=>I[lang];
function clean(s=''){const d=document.createElement('div');d.innerHTML=String(s);return(d.textContent||'').replace(/\s+/g,' ').trim()}function norm(s=''){return clean(s).toLowerCase().replace(/[^a-z0-9\s]/g,' ').replace(/\s+/g,' ').trim()}function val(x){return new Date(x.publishedAt||x.fetchedAt||0).getTime()||0}function imgOK(u=''){try{const x=new URL(String(u));return /^https?:$/.test(x.protocol)}catch{return false}}function score(x){const s=`${x.title||''} ${x.snippet||''}`.toLowerCase();if(OUT.some(v=>s.includes(v)))return-1;let n=0;IN.forEach(v=>{if(s.includes(v))n++});if(/\b(ai|llm|gpu)\b/i.test(s))n+=2;return n}function relevant(raw){const m=new Map();raw.forEach(r=>{const x={...r,title:clean(r.title||'Untitled'),snippet:clean(r.snippet||''),images:Array.isArray(r.images)?r.images.filter(imgOK).slice(0,5):[]};if(score(x)<=0)return;const k=norm(x.title);if(!k)return;const old=m.get(k);if(!old||val(x)>val(old))m.set(k,x)});return[...m.values()].sort((a,b)=>val(b)-val(a))}function age(x){const d=val(x);if(!d)return'';const diff=(Date.now()-d)/1000;if(diff<3600)return Math.max(1,Math.round(diff/60))+'m';if(diff<86400)return Math.round(diff/3600)+'h';return Math.round(diff/86400)+'d'}function domain(u=''){try{return new URL(u).hostname.replace(/^www\./,'')}catch{return''}}function icon(c=''){if(c.includes('China'))return'🐉';if(c.includes('Hardware'))return'⚡';if(c.includes('Policy'))return'⚖️';if(c.includes('Other'))return'🔬';return'🤖'}function applyLang(){const t=T();document.documentElement.lang=lang==='zh'?'zh-Hans':'en';document.title=t.title+' — JomNaik';$('appTitle').textContent=t.title;$('home').textContent=t.home;$('lang').textContent=t.toggle;$('search').placeholder=t.search;$('eyebrow').textContent=t.eyebrow;$('heroTitle').textContent=t.hero;$('heroDesc').textContent=t.desc;$('shownLabel').textContent=t.shown;$('totalLabel').textContent=t.total;$('latestLabel').textContent=t.latest;$('bAll').textContent=t.bottom[0];$('bAI').textContent=t.bottom[1];$('bChip').textContent=t.bottom[2];$('bChina').textContent=t.bottom[3];render()}function tabs(){const t=T();$('tabs').innerHTML='';CATS.forEach(c=>{const b=document.createElement('button');b.className='tab '+(c===cat?'active':'');b.textContent=t.tabs[c]||c;b.onclick=()=>{cat=c;render()};$('tabs').appendChild(b)})}function photos(x){const arr=(x.images||[]).slice(0,5);if(!arr.length)return null;const w=document.createElement('div');w.className='photos '+(arr.length===1?'one':arr.length===2?'two':'');arr.forEach(src=>{const im=document.createElement('img');im.src=src;im.alt='';im.loading='lazy';im.onerror=()=>im.remove();w.appendChild(im)});return w}function card(x){const a=document.createElement('a');a.className='card';a.href=x.link||'#';a.target='_blank';a.rel='noopener noreferrer';const p=photos(x);if(p)a.appendChild(p);const meta=document.createElement('div');meta.className='meta';const s=document.createElement('div');s.className='source';s.textContent=icon(x.category)+' '+(x.source||domain(x.link));const ag=document.createElement('div');ag.className='age';ag.textContent=age(x);meta.append(s,ag);const h=document.createElement('h3');h.textContent=x.title;const sn=document.createElement('p');sn.className='snippet';sn.textContent=x.snippet||domain(x.link);const tags=document.createElement('div');tags.className='tags';[T().tabs[x.category]||x.category,domain(x.link)].filter(Boolean).forEach(v=>{const e=document.createElement('span');e.className='tag';e.textContent=v;tags.appendChild(e)});a.append(meta,h,sn,tags);return a}function filtered(){return items.filter(x=>(cat==='All'||x.category===cat)&&(!q||`${x.title} ${x.snippet} ${x.source} ${x.category}`.toLowerCase().includes(q.toLowerCase())))}function render(){tabs();document.querySelectorAll('.nav').forEach(b=>b.classList.toggle('active',b.dataset.cat===cat));const f=filtered();$('feed').innerHTML='';$('shown').textContent=f.length;$('total').textContent=items.length;$('latest').textContent=items[0]?new Date(items[0].publishedAt||items[0].fetchedAt).toLocaleDateString(lang==='zh'?'zh-CN':undefined,{month:'short',day:'numeric'}):'—';$('subtitle').textContent=items.length?T().sub(f.length,items.length):T().init;if(!f.length){const e=document.createElement('div');e.className='empty';e.textContent=T().empty;$('feed').appendChild(e);return}f.slice(0,120).forEach(x=>$('feed').appendChild(card(x)))}async function load(){$('feed').innerHTML='<div class="empty">'+T().loading+'</div>';try{const r=await fetch('data/news-feed.json?ts='+Date.now(),{cache:'no-store'});if(!r.ok)throw new Error('HTTP '+r.status);items=relevant(await r.json());render()}catch(e){$('feed').innerHTML='<div class="empty">'+T().fail+e.message+'</div>'}}$('search').oninput=e=>{q=e.target.value.trim();render()};$('reload').onclick=load;$('lang').onclick=()=>{lang=lang==='zh'?'en':'zh';localStorage.setItem('newsReaderLang',lang);applyLang()};document.querySelectorAll('.nav').forEach(b=>b.onclick=()=>{cat=b.dataset.cat;window.scrollTo({top:0,behavior:'smooth'});render()});applyLang();load();
</script>
</body>
</html>
